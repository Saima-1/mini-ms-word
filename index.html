<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body> 
    
    <div id="container">
        <h1>Mini Ms Word</h1>
            <div id="items">
       <select id="font" style="width: 100px; background-color: violet; border-radius: 5px; padding: 2px 8px;">
        <option value="Calibri Light">Calibri Light</option>
        <option value="Arial">Arial</option>
        <option value="Arial Black">Arial Black</option>
        <option value="Bahnschrift">Bahnschrift</option>
        <option value="Bahnschrift Condensed">Bahnschrift Condensed</option>
        <option value="Bahnschrift Light">Bahnschrift Light</option>
        <option value="Bahnschrift SemiBold Condensed">Bahnschrift SemiBold Condensed</option>
        <option value="Bookshelf Symbol 7">Bookshelf Symbol 7</option>
        <option value="Cascadia Code">Cascadia Code</option>
        <option value="Constantia">Constantia</option>
        <option value="Impact">Impact</option>
        <option value="Franklin Gothic Medium">Franklin Gothic Medium</option>
        <option value="Microsoft PhagsPa">Microsoft PhagsPa</option>
        <option value="Segoe UI Variable Display">Segoe UI Variable Display</option>
        <option value="Webdings">Webdings</option>
       </select>
        <select  id="number" style="background-color: violet; border-radius: 5px; padding: 2px 8px;">
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="22">22</option>
            <option value="24">24</option>
            <option value="26">26</option>
            <option value="28">28</option>
            <option value="36">36</option>
            <option value="48">48</option>
            <option value="72">72</option>
        </select>
        <button id="bold" style="background-color: violet; border-radius: 5px; padding: 2px 8px;"><b>B</b></button>
        <button id="italic" style="background-color: violet; border-radius: 5px; padding: 2px 8px;"><i>I</i></button>
        <button id="underline" style="background-color: violet; border-radius: 5px; padding: 2px 8px;"><u>U</u></button>
        <!-- <select id="color" style="border: none;background-color: violet; border-radius: 5px; padding: 2px 8px;">
            <option value="">🅰️</option>
        </select> -->
        <span id="textcolor">🅰️</span>
        <input type="color" id="color" >
        <select  id="text" style="border: none; width: 50px; background-color: violet; border-radius: 5px; padding: 2px 8px;">
            <option value="Aa">Aa</option>
            <option value="upper case">upper case</option>
            <option value="lower case">lower case</option>
            <option value="camel case">camel case</option>
        </select>
        <button id="left"><img src="./images/icons8-align-left-30.png" alt="" width="20px">
        </button>
        <button id="center"><img src="./images/icons8-align-center-30.png" alt="" width="20px"></button>
        <button id="right"><img src="./images/icons8-align-right-30.png" alt="" width="20px"></button>
        <button id="justify"><img src="./images/icons8-align-justify-30.png" alt="" width="20px"></button>
        <img src="./images/icons8-fill-color-40-removebg-preview.png" alt="" width="40px" id="filler">
        <input type="color" id="bgcolor"   > 
        </div>
           <p id="para" contenteditable="true">
            type here....
           </p>
        </div>
    <script src="./app.js"></script>
</body>
</html>
